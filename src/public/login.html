<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 天翼云盘自动转存系统</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #dbe3f0;
            --text: #0f172a;
            --muted: #475569;
            --primary: #0b57d0;
            --primary-hover: #0948ad;
            --danger: #dc2626;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --border: #334155;
                --text: #f8fafc;
                --muted: #94a3b8;
            }
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }
        .card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 28px;
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        .eyebrow {
            margin: 0 0 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--primary);
            text-transform: uppercase;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 32px;
            font-weight: 600;
            color: var(--text);
        }
        p {
            margin: 0 0 32px;
            color: var(--muted);
            line-height: 1.6;
            font-size: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        input {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 87, 208, 0.1);
        }
        button {
            width: 100%;
            height: 52px;
            border: 0;
            border-radius: 16px;
            background: var(--primary);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        button:hover { 
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(11, 87, 208, 0.2);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            transform: none;
        }
        .error {
            min-height: 20px;
            margin-top: 16px;
            color: var(--danger);
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="eyebrow">Cloud189 Auto Save</div>
        <h1 id="pageTitle">登录</h1>
        <p id="pageDesc">输入系统账号后进入控制台。</p>
        <form id="loginForm">
            <div id="usernameSection">
                <label for="username" id="usernameLabel">用户名</label>
                <input id="username" name="username" type="text" autocomplete="username" required placeholder="请输入用户名" />
            </div>
            <div id="passwordSection">
                <label for="password" id="passwordLabel">密码</label>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
            </div>
            <div id="credentialHint" style="display:none; margin-top:-8px; margin-bottom:16px; font-size:13px; color:var(--primary); font-weight:500; line-height:1.5;">
                首次登录，请设置管理员用户名和密码以保护系统安全。<br>
                密码至少需要6位。
            </div>
            <button id="submitButton" type="submit">登录</button>
            <div id="errorMessage" class="error"></div>
        </form>
    </main>
    <script>
        const form = document.getElementById('loginForm');
        const submitButton = document.getElementById('submitButton');
        const errorMessage = document.getElementById('errorMessage');
        const pageTitle = document.getElementById('pageTitle');
        const pageDesc = document.getElementById('pageDesc');
        const usernameLabel = document.getElementById('usernameLabel');
        const usernameInput = document.getElementById('username');
        const passwordLabel = document.getElementById('passwordLabel');
        const passwordInput = document.getElementById('password');
        const credentialHint = document.getElementById('credentialHint');

        // 检测是否为首次登录（密码为空）
        let isFirstLogin = false;

        // 切换到设置凭证模式
        function switchToSetupMode() {
            isFirstLogin = true;
            pageTitle.textContent = '设置管理员账号';
            pageDesc.textContent = '首次登录，请设置管理员用户名和密码以保护系统安全。';
            usernameLabel.textContent = '设置用户名';
            usernameInput.setAttribute('placeholder', '请设置用户名');
            usernameInput.setAttribute('required', 'true');
            passwordLabel.textContent = '设置密码';
            passwordInput.setAttribute('placeholder', '请设置密码（至少6位）');
            passwordInput.setAttribute('required', 'true');
            credentialHint.style.display = 'block';
            submitButton.textContent = '设置并登录';
        }

        // 页面加载时检测
        async function checkFirstLogin() {
            try {
                // 先尝试用空密码登录来检测是否首次
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value || 'admin',
                        password: ''
                    })
                });
                const data = await response.json();
                if (data.requireSetCredentials) {
                    switchToSetupMode();
                }
            } catch (error) {
                // 忽略错误
            }
        }

        // 页面加载时检测
        window.addEventListener('load', () => {
            setTimeout(checkFirstLogin, 100);
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorMessage.textContent = '';
            submitButton.disabled = true;
            try {
                const requestBody = {
                    username: usernameInput.value,
                    password: passwordInput.value
                };

                // 如果是首次登录，添加新凭证字段
                if (isFirstLogin) {
                    requestBody.newUsername = usernameInput.value;
                    requestBody.newPassword = passwordInput.value;
                }

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/';
                    return;
                }
                // 如果返回 requireSetCredentials，更新页面显示
                if (data.requireSetCredentials) {
                    switchToSetupMode();
                }
                errorMessage.textContent = data.error || '登录失败';
            } catch (error) {
                errorMessage.textContent = '登录请求失败';
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
