<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 天翼云盘自动转存系统</title>
    <meta name="theme-color" content="#ffffff">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="自动转存" />
    <link rel="manifest" href="favicon/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/message.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .login-box {
            position: relative;
            width: 100%;
            max-width: 460px;
            margin: 1rem auto;
            padding: 32px 28px 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            background: color-mix(in srgb, var(--md-sys-color-surface-container-lowest) 86%, transparent);
            backdrop-filter: blur(24px);
            box-shadow: var(--md-elevation-3);
        }
        .login-box::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 42%);
        }
        .login-title {
            margin: 0 0 0.5rem;
            font-size: 2rem;
            letter-spacing: -0.04em;
            color: var(--text-color);
        }
        .login-overline {
            margin-bottom: 0.75rem;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--md-sys-color-primary);
        }
        .login-subtitle {
            margin: 0 0 2rem;
            line-height: 1.6;
            color: var(--md-sys-color-on-surface-variant);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .login-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .login-btn {
            width: 100%;
        }
        .login-footer {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--md-sys-color-on-surface-variant);
        }
        @media (max-width: 768px) {
            .login-container {
                padding: 16px;
            }
            .login-box {
                padding: 24px 20px 20px;
                border-radius: 28px;
            }
        }
    </style>
    <link rel="stylesheet" href="css/redesign.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-overline">Cloud189 Auto Save</div>
            <h2 class="login-title">欢迎回来</h2>
            <p class="login-subtitle">登录后即可进入 Material Design 3 控制台，继续管理任务、订阅和 STRM 流程。</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <div class="login-actions">
                    <button type="submit" class="login-btn">登录</button>
                </div>
            </form>
            <div class="login-footer">默认主题会跟随系统，也可以登录后切换为浅色或深色模式。</div>
        </div>
    </div>
    <script src="js/basePath.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/message.js"></script>
    <script>
        setTheme('auto')
        // 替换登录表单提交处理代码
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    window.location.href = './';
                } else {
                    message.error(data.error || '登录失败');
                }
            } catch (error) {
                message.error('登录失败');
            }
        });
    </script>
</body>
</html>
